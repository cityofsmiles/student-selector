<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Student Selector Pro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#2196f3">
  <link rel="apple-touch-icon" href="icon-512.png">

  <style>
    :root {
      --primary: #2196f3;
      --success: #4caf50;
      --danger: #f44336;
      --warning: #ff9800;
      --bg: #f8f9fa;
    }

    body {
      font-family: -apple-system, system-ui, sans-serif;
      padding: 5vw;
      background: var(--bg);
      text-align: center;
      margin: 0;
    }

    h1 { font-size: 7vw; margin: 20px 0 10px; }

    /* History & Activity Styles */
    .history-container {
      background: #fff;
      margin: 10px auto 20px;
      max-width: 500px;
      border-radius: 12px;
      padding: 15px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
      border: 1px solid #e0e0e0;
      text-align: left;
    }

    .history-title {
      font-size: 3.5vw;
      font-weight: bold;
      color: #666;
      margin-bottom: 8px;
      display: block;
      text-transform: uppercase;
    }

    .history-item {
      font-size: 3.8vw;
      padding: 5px 0;
      border-bottom: 1px solid #f1f1f1;
      display: flex;
      justify-content: space-between;
    }

    .history-item:last-child { border-bottom: none; }
    .history-tag { color: var(--primary); font-weight: bold; }

    .section-container {
      background: white;
      margin-bottom: 30px;
      max-width: 500px;
      margin-left: auto;
      margin-right: auto;
      padding: 25px;
      border-radius: 15px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }

    .custom-select {
      width: 100%;
      background: #fff;
      border: 2px solid var(--primary);
      padding: 15px;
      font-size: 5vw;
      cursor: pointer;
      border-radius: 10px;
      font-weight: bold;
      box-sizing: border-box;
    }

    .custom-options {
      display: none;
      background: #fff;
      border: 2px solid var(--primary);
      border-top: none;
      max-height: 200px;
      overflow-y: auto;
      border-radius: 0 0 10px 10px;
    }

    .custom-option { padding: 15px; border-top: 1px solid #eee; }

    .btn {
      color: white;
      padding: 18px;
      font-size: 5vw;
      margin-top: 15px;
      cursor: pointer;
      border-radius: 10px;
      font-weight: bold;
      user-select: none;
    }

    .next-btn { background: var(--primary); width: 100%; display: block; }
    .sync-btn { background: var(--success); font-size: 3.5vw; padding: 10px 20px; display: inline-block; }
    
    .small-btn-row { display: flex; gap: 10px; margin-top: 10px; }
    .small-btn { flex: 1; padding: 10px; font-size: 3vw; border-radius: 8px; }
    .delete-btn { background: var(--danger); }
    .reset-btn { background: var(--warning); }

    .student-box {
      margin-top: 20px;
      font-weight: 800;
      font-size: 9vw;
      color: #222;
      min-height: 1.2em;
    }

    .pop-in { animation: pop 0.3s cubic-bezier(0.17, 0.89, 0.32, 1.49); }
    @keyframes pop { 0% { transform: scale(0.6); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
  </style>
</head>
<body>

  <h1>🎓 Student Selector</h1>
  
  <div class="btn sync-btn" onclick="loadFromSheets()">🔄 Sync from Sheets</div>

  <div class="history-container">
    <span class="history-title">Recent Activity</span>
    <div id="history-log">
      <div class="history-item" style="color:#aaa">No activity yet...</div>
    </div>
  </div>

  <div class="section-container">
    <div id="section1" class="custom-select" onclick="toggle('section1-options')">Select Section</div>
    <div id="section1-options" class="custom-options"></div>
    <div class="btn next-btn" onclick="nextStudent('section1')">NEXT STUDENT</div>
    <div class="small-btn-row">
      <div class="btn small-btn delete-btn" onclick="absent('section1')">Absent</div>
      <div class="btn small-btn reset-btn" onclick="resetPool('section1')">Reset Pool</div>
    </div>
    <div id="student1" class="student-box">---</div>
  </div>

  <div class="section-container">
    <div id="section2" class="custom-select" onclick="toggle('section2-options')">Select Section</div>
    <div id="section2-options" class="custom-options"></div>
    <div class="btn next-btn" onclick="nextStudent('section2')">NEXT STUDENT</div>
    <div class="small-btn-row">
      <div class="btn small-btn delete-btn" onclick="absent('section2')">Absent</div>
      <div class="btn small-btn reset-btn" onclick="resetPool('section2')">Reset Pool</div>
    </div>
    <div id="student2" class="student-box">---</div>
  </div>

<script>
  const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ9nE9pp-Lk2y4nS7WFocx5P8tW2pJjw6m9t95n78accs0-9GymgaoG3d0Mfg4hiS8x3LFoYhkqVS7C/pub?output=csv";
  let master = {};
  let history = JSON.parse(localStorage.getItem("selector_history")) || [];

  async function loadFromSheets() {
    try {
      const res = await fetch(CSV_URL);
      const text = await res.text();
      const rows = text.split('\n').slice(1);
      master = {};
      rows.forEach(r => {
        const c = r.split(',').map(v => v.replace(/"/g, "").trim());
        if(c.length >= 3) {
          if(!master[c[2]]) master[c[2]] = [];
          master[c[2]].push(`${c[1]} ${c[0]}`);
        }
      });
      Object.keys(master).forEach(k => localStorage.setItem(k + "_m", JSON.stringify(master[k])));
      render();
    } catch(e) { loadLocal(); }
  }

  function loadLocal() {
    Object.keys(localStorage).forEach(k => {
      if(k.endsWith("_m")) master[k.replace("_m", "")] = JSON.parse(localStorage.getItem(k));
    });
    render();
  }

  function render() {
    ["section1", "section2"].forEach(id => {
      const opt = document.getElementById(id + "-options");
      opt.innerHTML = "";
      Object.keys(master).sort().forEach(s => {
        const d = document.createElement('div');
        d.className = 'custom-option';
        d.textContent = s;
        d.onclick = () => {
          document.getElementById(id).textContent = s;
          opt.style.display = 'none';
          localStorage.setItem(id, s);
        };
        opt.appendChild(d);
      });
      const saved = localStorage.getItem(id) || Object.keys(master)[0];
      if(saved) document.getElementById(id).textContent = saved;
    });
    updateHistoryUI();
  }

  function nextStudent(id) {
    const sec = document.getElementById(id).textContent;
    if(!master[sec]) return;
    let pool = JSON.parse(localStorage.getItem(sec + "_p")) || [];
    if(pool.length === 0) pool = [...master[sec]];
    
    const idx = Math.floor(Math.random() * pool.length);
    const picked = pool.splice(idx, 1)[0];
    localStorage.setItem(sec + "_p", JSON.stringify(pool));

    const box = document.getElementById("student" + id.slice(-1));
    box.textContent = picked;
    box.classList.remove("pop-in");
    void box.offsetWidth;
    box.classList.add("pop-in");

    // History Logic
    const entry = { name: picked, section: sec, time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) };
    history.unshift(entry);
    if(history.length > 5) history.pop();
    localStorage.setItem("selector_history", JSON.stringify(history));
    updateHistoryUI();
  }

  function updateHistoryUI() {
    const log = document.getElementById("history-log");
    if(history.length === 0) return;
    log.innerHTML = history.map(h => `
      <div class="history-item">
        <span>${h.name} <span class="history-tag">(${h.section})</span></span>
        <span style="color:#999; font-size:3vw">${h.time}</span>
      </div>
    `).join('');
  }

  function absent(id) {
    const name = document.getElementById("student" + id.slice(-1)).textContent;
    const sec = document.getElementById(id).textContent;
    if(name === "---" || !confirm(`Remove ${name} from ${sec} for now?`)) return;
    master[sec] = master[sec].filter(s => s !== name);
    let p = JSON.parse(localStorage.getItem(sec + "_p")) || [];
    localStorage.setItem(sec + "_p", JSON.stringify(p.filter(s => s !== name)));
    document.getElementById("student" + id.slice(-1)).textContent = "---";
  }

  function resetPool(id) {
    const sec = document.getElementById(id).textContent;
    if(confirm(`Refill pool for ${sec}?`)) localStorage.removeItem(sec + "_p");
  }

  function toggle(id) {
    const el = document.getElementById(id);
    const vis = el.style.display === 'block';
    document.querySelectorAll('.custom-options').forEach(d => d.style.display = 'none');
    el.style.display = vis ? 'none' : 'block';
  }

  if ("serviceWorker" in navigator) navigator.serviceWorker.register("./sw.js");
  loadFromSheets();
</script>
</body>
</html>
